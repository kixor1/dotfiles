source=./variables.conf

background {
  monitor =
  path = ./images/current/wallpaper.jpg
  blur_passes = 3
  contrast = 0.7
  brightness = 0.2
  vibrancy = 0.3
  vibrancy_darkness = 0.5
}

# general {
#   no_fade_in = false
#   grace = 5
#   immediate_render = true
#   disable_loading_bar = false
# }

image {
  monitor =
  path = ./images/profile.jpg
  border_size = 2
  border_color = rgba(0, 0, 0, 0)
  size = 160
  rounding = -1
  rotate = 0
  reload_time = -1
  reload_cmd =
  position = 0, 40
  halign = center
  valign = center
}

# date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%A, %B %d")"
    color = $color2
    font_size = 25
    font_family = SF Pro Display Semibold
    position = 0, -40
    halign = center
    valign = top
}

# time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M:%S")</span>"
    color = $color2
    font_size = 40
    font_family = SF Pro Display Bold
    position = 0, 30
    halign = center
    valign = bottom
}

# username
label {
    monitor =
    text = WELCOME, $USER
    color = rgba(255, 255, 255, 1)
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    font_size = 18
    font_family = SF Pro Display Bold
    position = 0, 80
    halign = center
    valign = center 
}

#password field
input-field {
    monitor =
    size = 600, 80
    outline_thickness = 2
    dots_size = 0.2                 # Password dot size (0.2-0.8)
    dots_spacing = 0.2              # Spacing between dots (0.0-1.0)
    dots_center = true              # Center dots in field
    outer_color = $color1
    inner_color = rgb(255, 255, 255)
    font_color = $color5
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Password</span></i>
    hide_input = false              # Show/hide password dots
    position = 0, 0
    halign = center
    valign = center
}
